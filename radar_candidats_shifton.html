
<h2 class="sr-only">Radar de compétences — comparaison des candidats DAF de transition pour SHIFTON</h2>
<style>
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
  .tab{padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary)}
  .tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;border-color:var(--color-border-primary)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
  @media(max-width:640px){.grid2{grid-template-columns:1fr}}
  .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem}
  .verdict{padding:10px 14px;border-radius:var(--border-radius-md);font-size:13px;line-height:1.5;margin-top:1rem}
  .verdict.green{background:var(--color-background-success);color:var(--color-text-success)}
  .verdict.amber{background:var(--color-background-warning);color:var(--color-text-warning)}
  .verdict.red{background:var(--color-background-danger);color:var(--color-text-danger)}
  .score-row{display:flex;align-items:center;gap:8px;margin:6px 0}
  .score-label{font-size:12px;color:var(--color-text-secondary);width:130px;flex-shrink:0}
  .bar-bg{flex:1;height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px}
  .score-num{font-size:12px;font-weight:500;width:20px;text-align:right;flex-shrink:0}
  .name-badge{font-size:15px;font-weight:500;margin-bottom:4px}
  .sub-badge{font-size:12px;color:var(--color-text-secondary);margin-bottom:12px}
  .overall-badge{display:inline-block;font-size:12px;font-weight:500;padding:3px 10px;border-radius:var(--border-radius-md);margin-bottom:10px}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--color-text-secondary);margin-bottom:1rem}
  .legend span{display:flex;align-items:center;gap:4px}
  .legend-dot{width:10px;height:10px;border-radius:50%}
</style>

<div class="tabs" id="tabBar"></div>
<div class="legend" id="legend"></div>
<div class="grid2">
  <div class="card" style="display:flex;flex-direction:column;align-items:center">
    <canvas id="radarCanvas" width="300" height="300" role="img" aria-label="Radar de compétences du candidat sélectionné"></canvas>
  </div>
  <div class="card" id="detailCard"></div>
</div>
<div class="card" id="compChart" style="margin-bottom:1.5rem">
  <div style="font-size:13px;font-weight:500;margin-bottom:1rem;color:var(--color-text-primary)">Score global comparé (moyenne pondérée)</div>
  <canvas id="barCanvas" role="img" aria-label="Scores globaux comparés des 7 candidats" style="width:100%"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const AXES = ['Expérience PME','M&A / Cession','Run opérationnel','Disponibilité','Proximité géo'];
const WEIGHTS = [0.25, 0.30, 0.25, 0.10, 0.10];

const candidates = [
  {
    name:'Xavier Milin', short:'X. Milin', color:'#534AB7',
    sub:'DAF temps partagé — Paris',
    scores:[9,8,7,5,3],
    verdict:'green',
    comment:'Profil exceptionnel sur la dimension M&A (accompagnement cessions, LBO, levées de fonds). Expert PME innovantes. Idéal pour la phase due diligence. Bémol : basé à Paris, multi-mandats simultanés — disponibilité à sécuriser absolument avant d\'engager.',
  },
  {
    name:'Julien Bercez', short:'J. Bercez', color:'#1D9E75',
    sub:'DAF industriel — Béthune',
    scores:[7,4,9,7,8],
    verdict:'amber',
    comment:'Très solide sur le run (clôtures, reporting, ERP, lean). Profil industriel cohérent avec la distribution. Peu d\'exposition M&A/cession : risque sur la phase due diligence. Proximité Béthune est un atout fort. Pertinent si un conseil M&A externe prend en charge la due diligence.',
  },
  {
    name:'Jérôme Simonnet', short:'J. Simonnet', color:'#D85A30',
    sub:'DAF / Secrétaire général — Lesquin',
    scores:[8,5,8,4,9],
    verdict:'amber',
    comment:'Profil PME solide, expérience gouvernance et structuration financière. Lesquin = proximité immédiate. Disponibilité réduite : projet personnel MS Park SAS en cours depuis 2022. À vérifier s\'il peut s\'engager à temps plein sur mai.',
  },
  {
    name:'Antoine Richard', short:'A. Richard', color:'#BA7517',
    sub:'Management de transition — Lille',
    scores:[7,6,8,8,9],
    verdict:'green',
    comment:'Profil transition aguerri, disponibilité structurelle (SASU). Expose à la cession (Pimkie post-acquisition) et au BP d\'acquisition. Lille = disponibilité géographique immédiate. Manque d\'expérience sell-side directe, mais profil polyvalent et réactif.',
  },
  {
    name:'Laurent Philippe', short:'L. Philippe', color:'#378ADD',
    sub:'DAF transition — temps partagé',
    scores:[6,4,7,7,5],
    verdict:'amber',
    comment:'Spécialiste gestion de crise et digitalisation (Power BI). Expérience LBO (Ressort Huon Dubois) utile. Faible exposition M&A sell-side. Localisation non précisée. Profil pertinent si besoin de structuration outil / reporting, moins sur la due diligence.',
  },
  {
    name:'Julien Legrand', short:'J. Legrand', color:'#D4537E',
    sub:'CFO — Illies (59)',
    scores:[6,7,7,7,8],
    verdict:'green',
    comment:'Seul profil avec expérience M&A explicite en tant que CFO (Diagast : opérations de capital, due diligence, gouvernance). Expérience startup et PME internationale. Illies = 20 min de Lille. Profil atypique mais pertinent pour la phase cession.',
  },
  {
    name:'Nicolas Acket', short:'N. Acket', color:'#888780',
    sub:'DAF groupe — Forest-sur-Marque',
    scores:[4,6,6,4,8],
    verdict:'red',
    comment:'Profil groupe bancaire / retail international — peu adapté à la PME distribution. Expérience due diligence (vendor DD Oney) intéressante mais très sectorielle. Semble toujours en poste chez Oney jusqu\'en 2025. Disponibilité incertaine et profil sur-dimensionné pour le contexte.',
  },
];

function globalScore(c){
  return c.scores.reduce((s,v,i)=>s+v*WEIGHTS[i],0);
}

const colors = candidates.map(c=>c.color);
let active = 0;

function initTabs(){
  const bar = document.getElementById('tabBar');
  const leg = document.getElementById('legend');
  candidates.forEach((c,i)=>{
    const t = document.createElement('button');
    t.className='tab'+(i===0?' active':'');
    t.textContent=c.short;
    t.style.borderLeft=`3px solid ${c.color}`;
    t.onclick=()=>{ active=i; renderAll(); };
    bar.appendChild(t);
    const s=document.createElement('span');
    s.innerHTML=`<span class="legend-dot" style="background:${c.color}"></span>${c.short}`;
    leg.appendChild(s);
  });
}

let radarChart=null, barChart=null;

function renderRadar(){
  const c = candidates[active];
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.08)';
  const textColor = isDark ? '#b0aea8' : '#888780';
  const ctx = document.getElementById('radarCanvas').getContext('2d');
  if(radarChart){ radarChart.destroy(); }
  radarChart = new Chart(ctx,{
    type:'radar',
    data:{
      labels: AXES,
      datasets:[{
        label:c.short,
        data:c.scores,
        borderColor:c.color,
        backgroundColor:c.color+'28',
        pointBackgroundColor:c.color,
        pointRadius:4,
        borderWidth:2,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false}},
      scales:{r:{
        min:0,max:10,ticks:{stepSize:2,color:textColor,font:{size:10},backdropColor:'transparent'},
        grid:{color:gridColor},
        angleLines:{color:gridColor},
        pointLabels:{color:textColor,font:{size:11}},
      }},
    }
  });
}

function renderDetail(){
  const c = candidates[active];
  const gs = globalScore(c).toFixed(1);
  const bgMap={green:'var(--color-background-success)',amber:'var(--color-background-warning)',red:'var(--color-background-danger)'};
  const fgMap={green:'var(--color-text-success)',amber:'var(--color-text-warning)',red:'var(--color-text-danger)'};
  const labelMap={green:'Recommandé',amber:'Sous conditions',red:'Non prioritaire'};
  const bars = c.scores.map((s,i)=>`
    <div class="score-row">
      <span class="score-label">${AXES[i]}</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${s*10}%;background:${c.color}"></div></div>
      <span class="score-num" style="color:${c.color}">${s}</span>
    </div>`).join('');
  document.getElementById('detailCard').innerHTML=`
    <div class="name-badge">${c.name}</div>
    <div class="sub-badge">${c.sub}</div>
    <span class="overall-badge" style="background:${bgMap[c.verdict]};color:${fgMap[c.verdict]}">${labelMap[c.verdict]} — score ${gs}/10</span>
    ${bars}
    <div class="verdict ${c.verdict}">${c.comment}</div>
  `;
}

function renderBar(){
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const ctx = document.getElementById('barCanvas').getContext('2d');
  if(barChart){barChart.destroy();}
  const scores = candidates.map(c=>parseFloat(globalScore(c).toFixed(2)));
  const bgColors = candidates.map((c,i)=>i===active?c.color:c.color+'70');
  const wrapper = document.getElementById('compChart');
  wrapper.style.height = (candidates.length*44+80)+'px';
  barChart = new Chart(ctx,{
    type:'bar',
    data:{
      labels:candidates.map(c=>c.short),
      datasets:[{
        data:scores,
        backgroundColor:bgColors,
        borderRadius:4,
        borderWidth:0,
      }]
    },
    options:{
      indexAxis:'y',
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' Score : '+ctx.raw.toFixed(1)}}},
      scales:{
        x:{min:0,max:10,ticks:{color:isDark?'#b0aea8':'#888780',font:{size:11}},grid:{color:isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)'}},
        y:{ticks:{color:isDark?'#e0ddd5':'#444441',font:{size:12}},grid:{display:false}},
      }
    }
  });
}

function renderAll(){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===active));
  renderRadar();
  renderDetail();
  renderBar();
}

initTabs();
renderAll();
</script>
